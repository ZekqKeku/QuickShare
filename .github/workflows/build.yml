name: Build QuickShare

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_msvc2019_64
            artifact_name: QuickShare-Windows.exe
            build_folder: build
          - os: macos-latest
            qt_arch: clang_64
            artifact_name: QuickShare-macOS.zip
            build_folder: build
          - os: ubuntu-latest
            qt_arch: gcc_64
            artifact_name: QuickShare-Linux
            build_folder: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.2'
        host: ${{ matrix.os == 'windows-latest' && 'windows' || matrix.os == 'macos-latest' && 'mac' || 'linux' }}
        target: 'desktop'
        arch: ${{ matrix.qt_arch }}

    - name: Install Linux Dependencies (Ubuntu only)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 libxcb-shape0 ninja-build zip

    - name: Configure CMake
      run: cmake -B ${{ matrix.build_folder }} -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build ${{ matrix.build_folder }} --config Release -j 4

    - name: Package macOS App
      if: runner.os == 'macOS'
      run: |
        cd ${{ matrix.build_folder }}
        macdeployqt QuickShare.app
        codesign --force --deep --sign - QuickShare.app
        ditto -c -k --keepParent QuickShare.app QuickShare-macOS.zip

    - name: Package Windows Exe (windeployqt)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        cd ${{ matrix.build_folder }}
        windeployqt.exe QuickShare.exe
        mkdir QuickShare-Release
        move QuickShare.exe QuickShare-Release\
        move *.dll QuickShare-Release\
        move tls QuickShare-Release\
        tar -a -c -f QuickShare-Windows.zip QuickShare-Release

    - name: Upload Artifacts (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: QuickShare-macOS
        path: ${{ matrix.build_folder }}/QuickShare-macOS.zip

    - name: Upload Artifacts (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: QuickShare-Windows
        path: ${{ matrix.build_folder }}\QuickShare-Windows.zip

    - name: Upload Artifacts (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: QuickShare-Linux
        path: ${{ matrix.build_folder }}/QuickShare
