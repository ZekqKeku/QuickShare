name: Build and Release QuickShare

on:
  push:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_msvc2019_64
            build_folder: build
            platform: Windows
          - os: macos-latest
            qt_arch: clang_64
            build_folder: build
            platform: macOS
          - os: ubuntu-latest
            qt_arch: gcc_64
            build_folder: build
            platform: Linux

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version info from manifest.json
      id: manifest
      shell: bash
      run: |
        NAME=$(python3 -c "import json; print(json.load(open('manifest.json'))['name'])")
        VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
        STATUS=$(python3 -c "import json; print(json.load(open('manifest.json'))['status'])")
        echo "app_id=${NAME}-${STATUS}-${VERSION}" >> $GITHUB_OUTPUT

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.2'
        host: ${{ matrix.os == 'windows-latest' && 'windows' || matrix.os == 'macos-latest' && 'mac' || 'linux' }}
        target: 'desktop'
        arch: ${{ matrix.qt_arch }}

    - name: Install Linux Dependencies (Ubuntu only)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 libxcb-shape0 ninja-build zip

    - name: Configure CMake
      run: cmake -B ${{ matrix.build_folder }} -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build ${{ matrix.build_folder }} --config Release -j 4

    - name: Run Tests
      shell: bash
      run: |
        cd ${{ matrix.build_folder }}
        ctest -C Release --output-on-failure

    - name: Package macOS App
      if: runner.os == 'macOS'
      run: |
        cd ${{ matrix.build_folder }}
        macdeployqt QuickShare.app
        codesign --force --deep --sign - QuickShare.app
        mv QuickShare.app ${{ steps.manifest.outputs.app_id }}.app
        ditto -c -k --keepParent ${{ steps.manifest.outputs.app_id }}.app ${{ steps.manifest.outputs.app_id }}-macOS.zip

    - name: Package Windows Exe (windeployqt)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        TARGET_EXE="build/Release/QuickShare.exe"
        if [ ! -f "$TARGET_EXE" ]; then TARGET_EXE="build/QuickShare.exe"; fi
        
        windeployqt --release "$TARGET_EXE"
        
        APP_NAME_VER="${{ steps.manifest.outputs.app_id }}"
        mkdir -p "${APP_NAME_VER}-Release"
        
        cp "$TARGET_EXE" "${APP_NAME_VER}-Release/${APP_NAME_VER}.exe"
        
        EXE_DIR=$(dirname "$TARGET_EXE")
        cp "$EXE_DIR"/*.dll "${APP_NAME_VER}-Release/" 2>/dev/null || true
        cp -r "$EXE_DIR"/platforms "${APP_NAME_VER}-Release/" 2>/dev/null || true
        cp -r "$EXE_DIR"/styles "${APP_NAME_VER}-Release/" 2>/dev/null || true
        cp -r "$EXE_DIR"/tls "${APP_NAME_VER}-Release/" 2>/dev/null || true
        
        7z a "${APP_NAME_VER}-Windows.zip" "${APP_NAME_VER}-Release"
        
        mv "${APP_NAME_VER}-Windows.zip" build/

    - name: Package Linux (AppImage)
      if: runner.os == 'Linux'
      env:
        QT_QPA_PLATFORM: minimal
      run: |
        # Install linuxdeploy and the Qt plugin
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy*.AppImage
        
        # Create wrappers to avoid FUSE issues on GitHub Actions
        echo '#!/bin/bash' > linuxdeploy-wrapper.sh
        echo 'export APPIMAGE_EXTRACT_AND_RUN=1' >> linuxdeploy-wrapper.sh
        echo './linuxdeploy-x86_64.AppImage "$@"' >> linuxdeploy-wrapper.sh
        chmod +x linuxdeploy-wrapper.sh
        
        echo '#!/bin/bash' > linuxdeploy-plugin-qt
        echo 'export APPIMAGE_EXTRACT_AND_RUN=1' >> linuxdeploy-plugin-qt
        echo './linuxdeploy-plugin-qt-x86_64.AppImage "$@"' >> linuxdeploy-plugin-qt
        chmod +x linuxdeploy-plugin-qt
        export PATH=$PATH:.
        
        # Create AppDir by installing the project
        cmake --install ${{ matrix.build_folder }} --prefix AppDir/usr
        
        # Set up environment for linuxdeploy
        export QMAKE=$(which qmake || echo $QT_ROOT_DIR/bin/qmake)
        
        # Run linuxdeploy to create the AppImage
        ./linuxdeploy-wrapper.sh --appdir AppDir \
          -d AppDir/usr/share/applications/com.quickshare.app.desktop \
          -i AppDir/usr/share/icons/hicolor/512x512/apps/com.quickshare.app.png \
          --plugin qt \
          --output appimage
        
        # Move and rename the resulting AppImage
        APP_NAME_VER="${{ steps.manifest.outputs.app_id }}"
        mv QuickShare*.AppImage "${APP_NAME_VER}-Linux.AppImage"
        
        # Zip it as well
        zip -j "${APP_NAME_VER}-Linux.zip" "${APP_NAME_VER}-Linux.AppImage"
        
        # Move to build folder for upload step
        mv "${APP_NAME_VER}-Linux.AppImage" "${{ matrix.build_folder }}/"
        mv "${APP_NAME_VER}-Linux.zip" "${{ matrix.build_folder }}/"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artifact-${{ matrix.platform }}
        path: |
          ${{ matrix.build_folder }}/*.zip
          ${{ matrix.build_folder }}/*.AppImage

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version info from manifest.json
      id: manifest
      run: |
        VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
        STATUS=$(python3 -c "import json; print(json.load(open('manifest.json'))['status'])")
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "status=${STATUS}" >> $GITHUB_OUTPUT
        echo "tag=${STATUS}-v${VERSION}" >> $GITHUB_OUTPUT

    - name: Check if release exists
      id: check_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh release view ${{ steps.manifest.outputs.tag }} > /dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Release ${{ steps.manifest.outputs.tag }} already exists. Skipping."
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Download all artifacts
      if: steps.check_release.outputs.exists == 'false'
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts
        pattern: artifact-*
        merge-multiple: true

    - name: Create Release
      if: steps.check_release.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.manifest.outputs.tag }}
        name: QuickShare ${{ steps.manifest.outputs.status }} v${{ steps.manifest.outputs.version }}
        files: |
          all-artifacts/*.zip
          all-artifacts/*.AppImage
        draft: false
        prerelease: ${{ steps.manifest.outputs.status != 'stable' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
